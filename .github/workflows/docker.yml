name: Build and Push Docker Image

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and Push Backend
        run: |
          docker build -t ghcr.io/juantabares19/project-enfasis-ecommerce-backend:latest ./backend
          docker push ghcr.io/juantabares19/project-enfasis-ecommerce-backend:latest

      - name: Build and Push Frontend
        run: |
          docker build -t ghcr.io/juantabares19/project-enfasis-ecommerce-frontend:latest ./frontend
          docker push ghcr.io/juantabares19/project-enfasis-ecommerce-frontend:latest